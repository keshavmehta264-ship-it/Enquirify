<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClientFlow Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --accent:#00f0ff;
  --accent2:#8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* CANVAS */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* SECTIONS */
.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:80px 10%;
  text-align:center;
}

/* TYPO */
h1{
  font-size:3rem;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  color:transparent;
}
h2{margin-bottom:20px}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:14px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}
.card{
  width:260px;
  padding:20px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  transition:.3s;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 30px var(--accent);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- HERO -->
<section class="section hero">
  <h1>Smart Systems That Convert Customers</h1>
  <p>We build high-converting systems, not just websites.</p>
  <button class="btn" onclick="wa()">Get Free Demo</button>
</section>

<!-- SERVICES -->
<section class="section services">
  <h2>Services</h2>
  <div class="cards">
    <div class="card">Lead Generation</div>
    <div class="card">WhatsApp Funnels</div>
    <div class="card">Conversion Systems</div>
  </div>
</section>

<!-- CTA -->
<section class="section">
  <h2>Ready to Grow?</h2>
  <button class="btn" onclick="wa()">Start Now</button>
</section>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
// ================= THREE.JS =================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('bg'), antialias:true});
renderer.setSize(innerWidth, innerHeight);
camera.position.z = 6;

// PARTICLES
const geo = new THREE.BufferGeometry();
const count = 400;
const arr = new Float32Array(count*3);
for(let i=0;i<arr.length;i++){
  arr[i]=(Math.random()-0.5)*20;
}
geo.setAttribute('position', new THREE.BufferAttribute(arr,3));

const mat = new THREE.PointsMaterial({size:0.04,color:0x00f0ff});
const points = new THREE.Points(geo,mat);
scene.add(points);

// FLOATING OBJECT
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0x8b5cf6, wireframe:true})
);
scene.add(cube);

// LIGHT
const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

// ANIMATE
function animate(){
  requestAnimationFrame(animate);
  cube.rotation.x+=0.01;
  cube.rotation.y+=0.01;
  points.rotation.y+=0.0008;
  renderer.render(scene,camera);
}
animate();

// RESIZE
addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ================= GSAP =================
gsap.registerPlugin(ScrollTrigger);

// HERO ENTRY
gsap.from(".hero h1",{
  y:80,
  opacity:0,
  duration:1.2
});

// SERVICES ANIMATION
gsap.from(".card",{
  scrollTrigger:{
    trigger:".services",
    start:"top 70%"
  },
  y:60,
  opacity:0,
  stagger:0.2,
  duration:1
});

// ================= WHATSAPP =================
function wa(){
  window.open("https://wa.me/91XXXXXXXXXX?text=Hi%20I%20want%20to%20grow%20my%20business");
}
</script>

</body>
</html>
